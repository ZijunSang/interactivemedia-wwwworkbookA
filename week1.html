<div class="week1_container">

  <div class="week1_content">

  <div class="week1_content">

</div>
<div style="text-align: center; margin: 60px 0;">
  <button id="applauseBtn" style="padding: 20px 40px; font-size: 24px; font-weight: 900; color: rgb(195, 255, 186); background: rgba(230, 9, 250, 0.2); border: 2px solid rgb(230, 9, 250); border-radius: 12px; cursor: pointer;">
    READY FOR A ROUND OF APPLAUSE? CLICK ME!
  </button>
</div>
<audio id="applauseSound" preload="auto">
  <source src="aroundofapplause.mp3" type="audio/mpeg">
</audio>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const applauseBtn = document.getElementById('applauseBtn');
  const applauseSound = document.getElementById('applauseSound');
  if (applauseBtn && applauseSound) {
    applauseBtn.addEventListener('click', function() {
      applauseSound.currentTime = 0; //
      applauseSound.play().catch(error => {
        console.log("Sound play error (usually browser autoplay restriction):", error);
      });
    });
  }
});
</script>
</body>
